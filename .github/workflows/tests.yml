name: k6 Performance Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'

jobs:
  per-push:
    name: Smoke / Load / Spike
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v6

      - name: Install k6
        run: |
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Smoke test
        run: k6 run tests/smoke.js

      - name: Load test
        run: k6 run tests/load.js

      - name: Spike test
        run: k6 run tests/spike.js

      - name: Upload results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: k6-results-push-${{ github.run_id }}
          path: results/

  nightly:
    name: Stress / Soak
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v6

      - name: Install k6
        run: |
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Stress test
        run: k6 run tests/stress.js

      - name: Soak test
        run: k6 run tests/soak.js

      - name: Upload results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: k6-results-nightly-${{ github.run_id }}
          path: results/
